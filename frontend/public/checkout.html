<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/sewaaja/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/sewaaja/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/sewaaja/assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/sewaaja/assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/sewaaja/site.webmanifest">
    <meta name="description" content="Checkout rental SewaAja dengan validasi stok, tanggal sewa, deposit, dan total pembayaran.">
    <title>Checkout Rental - SewaAja</title>
    <link rel="preload" href="assets/img/sewaaja-logo-wordmark.webp" as="image">
    <script>
        window.tailwind = window.tailwind || {};
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#061f4f',
                        navySoft: '#0b2f68',
                        orangeBrand: '#ff6a00',
                        orangeDark: '#e95d00',
                        ink: '#071a3d',
                    },
                    boxShadow: {
                        brand: '0 24px 70px rgba(6, 31, 79, 0.12)',
                        soft: '0 16px 40px rgba(6, 31, 79, 0.08)',
                    },
                },
            },
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fbff] text-[#071a3d] antialiased">
    <header class="sticky top-0 z-50 border-b border-slate-100 bg-white/90 backdrop-blur-xl">
        <nav class="mx-auto flex h-20 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
            <a href="/sewaaja/" class="flex items-center">
                <img src="assets/img/sewaaja-logo-wordmark.webp" alt="SewaAja" class="h-14 w-44 object-contain object-center">
            </a>
            <div class="flex items-center gap-3">
                <a href="/sewaaja/products" class="rounded-full border border-slate-200 px-5 py-3 text-sm font-black text-[#061f4f] transition hover:border-[#ff6a00] hover:text-[#ff6a00]">Katalog</a>
                <a href="/sewaaja/login" class="rounded-full bg-[#ff6a00] px-5 py-3 text-sm font-black text-white transition hover:bg-[#e95d00]">Masuk</a>
            </div>
        </nav>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-8">
            <p class="text-sm font-black uppercase tracking-[0.16em] text-[#ff6a00]">Checkout</p>
            <h1 class="mt-2 text-4xl font-black text-[#061f4f] sm:text-5xl">Review cart sewa</h1>
            <p class="mt-3 max-w-2xl text-slate-600">SewaAja akan mengecek ulang stok dan overlap booking sebelum transaksi dibuat.</p>
        </div>

        <div id="checkoutAlert" class="mb-5 hidden rounded-lg border p-4 text-sm font-bold"></div>

        <section class="grid gap-8 lg:grid-cols-[minmax(0,1fr)_380px]">
            <div class="rounded-lg border border-slate-100 bg-white p-5 shadow-[0_16px_40px_rgba(6,31,79,0.08)]">
                <div class="mb-4 flex items-center justify-between gap-4">
                    <h2 class="text-2xl font-black text-[#061f4f]">Cart</h2>
                    <button id="clearCart" class="text-sm font-black text-[#ff6a00]" type="button">Kosongkan</button>
                </div>
                <div id="cartItems" class="grid gap-4"></div>
            </div>

            <aside class="lg:sticky lg:top-28 lg:self-start">
                <form id="checkoutForm" class="rounded-lg border border-slate-100 bg-white p-6 shadow-[0_24px_70px_rgba(6,31,79,0.12)]">
                    <p class="text-sm font-black uppercase tracking-[0.16em] text-[#ff6a00]">Ringkasan</p>
                    <h2 class="mt-2 text-2xl font-black text-[#061f4f]">Total checkout</h2>

                    <div class="mt-5 rounded-lg bg-[#f8fbff] p-4">
                        <div class="flex justify-between py-2 text-sm font-bold text-slate-600">
                            <span>Subtotal</span>
                            <span id="summarySubtotal">Rp0</span>
                        </div>
                        <div class="flex justify-between py-2 text-sm font-bold text-slate-600">
                            <span>Deposit</span>
                            <span id="summaryDeposit">Rp0</span>
                        </div>
                        <div class="mt-2 flex justify-between border-t border-slate-200 pt-4 text-lg font-black text-[#061f4f]">
                            <span>Total</span>
                            <span id="summaryTotal">Rp0</span>
                        </div>
                    </div>

                    <div class="mt-5">
                        <label for="paymentMethod" class="mb-2 block text-sm font-black text-[#061f4f]">Metode pembayaran</label>
                        <select id="paymentMethod" class="h-12 w-full rounded-lg border border-slate-200 px-4 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10">
                            <option value="all">Midtrans: QRIS + Virtual Account</option>
                            <option value="qris">Midtrans: QRIS</option>
                            <option value="va">Midtrans: Virtual Account</option>
                        </select>
                    </div>

                    <div class="mt-4">
                        <label for="checkoutNotes" class="mb-2 block text-sm font-black text-[#061f4f]">Catatan</label>
                        <textarea id="checkoutNotes" rows="3" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10" placeholder="Catatan pickup, alamat, atau kebutuhan khusus"></textarea>
                    </div>

                    <button id="checkoutButton" class="mt-5 w-full rounded-full bg-[#ff6a00] px-7 py-4 text-sm font-black text-white transition hover:bg-[#e95d00] disabled:cursor-not-allowed disabled:bg-slate-300" type="submit">Buat Booking</button>
                    <div id="paymentActions" class="mt-4 grid gap-3"></div>
                    <p id="loginHint" class="mt-4 text-center text-xs font-semibold leading-5 text-slate-500"></p>
                </form>
            </aside>
        </section>
    </main>

    <script src="assets/js/auth-store.js"></script>
    <script src="assets/js/checkout.js"></script>
</body>
</html>
