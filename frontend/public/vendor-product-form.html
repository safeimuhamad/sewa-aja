<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/sewaaja/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/sewaaja/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/sewaaja/assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/sewaaja/assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/sewaaja/site.webmanifest">
    <meta name="robots" content="noindex">
    <title>Kelola Produk Vendor - SewaAja</title>
    <link rel="preload" href="assets/img/sewaaja-logo-wordmark.webp" as="image">
    <script>
        window.tailwind = window.tailwind || {};
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#061f4f',
                        orangeBrand: '#ff6a00',
                        ink: '#071a3d',
                    },
                },
            },
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fbff] text-[#071a3d] antialiased">
    <header class="sticky top-0 z-40 border-b border-slate-200 bg-white/90 backdrop-blur-xl">
        <nav class="mx-auto flex h-20 max-w-6xl items-center justify-between px-4 sm:px-6 lg:px-8">
            <a href="/sewaaja/vendor-dashboard" aria-label="SewaAja Vendor Dashboard">
                <img src="assets/img/sewaaja-logo-wordmark.webp" alt="SewaAja" class="h-14 w-44 object-contain object-center">
            </a>
            <div class="flex items-center gap-3">
                <a href="/sewaaja/vendor-dashboard" class="rounded-full border border-slate-200 px-4 py-2 text-sm font-black text-[#061f4f] hover:border-[#ff6a00] hover:text-[#ff6a00]">Dashboard</a>
                <button id="logoutButton" class="rounded-full px-4 py-2 text-sm font-black text-[#061f4f] hover:text-[#ff6a00]" type="button">Keluar</button>
            </div>
        </nav>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-8">
            <p class="text-sm font-black uppercase tracking-[0.16em] text-[#ff6a00]">Product Management</p>
            <h1 id="pageTitle" class="mt-2 text-3xl font-black text-[#061f4f] sm:text-4xl">Tambah produk</h1>
            <p id="pageSubtitle" class="mt-2 max-w-2xl text-sm font-semibold text-slate-500">Buat produk rental baru, masukkan harga, stok, status, dan gambar galeri awal.</p>
        </div>

        <div id="formAlert" hidden></div>

        <form id="productForm" class="grid gap-6 lg:grid-cols-[1fr_340px]">
            <section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                <h2 class="text-lg font-black text-[#061f4f]">Informasi Produk</h2>
                <div class="mt-5 grid gap-4 sm:grid-cols-2">
                    <div class="sm:col-span-2">
                        <label for="name" class="mb-2 block text-sm font-black text-[#061f4f]">Nama produk</label>
                        <input id="name" name="name" required class="h-12 w-full rounded-lg border border-slate-200 px-4 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10" placeholder="Contoh: Kamera Sony A7 III">
                    </div>
                    <div>
                        <label for="category_id" class="mb-2 block text-sm font-black text-[#061f4f]">Kategori</label>
                        <select id="category_id" name="category_id" required class="h-12 w-full rounded-lg border border-slate-200 px-3 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10">
                            <option value="">Memuat kategori...</option>
                        </select>
                    </div>
                    <div>
                        <label for="status" class="mb-2 block text-sm font-black text-[#061f4f]">Status</label>
                        <select id="status" name="status" class="h-12 w-full rounded-lg border border-slate-200 px-3 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10">
                            <option value="draft">Draft</option>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="sm:col-span-2">
                        <label for="description" class="mb-2 block text-sm font-black text-[#061f4f]">Deskripsi</label>
                        <textarea id="description" name="description" rows="6" class="w-full rounded-lg border border-slate-200 px-4 py-3 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10" placeholder="Kondisi, kelengkapan, syarat sewa, dan catatan pickup."></textarea>
                    </div>
                </div>
            </section>

            <aside class="grid gap-6">
                <section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                    <h2 class="text-lg font-black text-[#061f4f]">Harga dan Inventory</h2>
                    <div class="mt-5 grid gap-4">
                        <div>
                            <label for="price_per_day" class="mb-2 block text-sm font-black text-[#061f4f]">Harga per hari</label>
                            <input id="price_per_day" name="price_per_day" required min="0" type="number" class="h-12 w-full rounded-lg border border-slate-200 px-4 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10" placeholder="175000">
                        </div>
                        <div>
                            <label for="deposit_amount" class="mb-2 block text-sm font-black text-[#061f4f]">Deposit</label>
                            <input id="deposit_amount" name="deposit_amount" min="0" type="number" class="h-12 w-full rounded-lg border border-slate-200 px-4 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10" placeholder="50000">
                        </div>
                        <div class="grid grid-cols-[1fr_100px] gap-3">
                            <div>
                                <label for="stock_quantity" class="mb-2 block text-sm font-black text-[#061f4f]">Stok</label>
                                <input id="stock_quantity" name="stock_quantity" min="0" type="number" class="h-12 w-full rounded-lg border border-slate-200 px-4 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10" value="1">
                            </div>
                            <div>
                                <label for="unit_label" class="mb-2 block text-sm font-black text-[#061f4f]">Satuan</label>
                                <input id="unit_label" name="unit_label" class="h-12 w-full rounded-lg border border-slate-200 px-3 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10" value="unit">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                    <h2 class="text-lg font-black text-[#061f4f]">Upload Gallery</h2>
                    <div id="mediaDropzone" class="mt-5 cursor-pointer rounded-lg border-2 border-dashed border-slate-200 bg-[#f8fbff] p-5 text-center transition">
                        <p class="text-sm font-black text-[#061f4f]">Drag & drop gambar</p>
                        <p class="mt-1 text-xs font-bold text-slate-500">JPG, PNG, WebP. Maksimal 5MB per file.</p>
                        <input id="mediaInput" type="file" class="hidden" accept="image/jpeg,image/png,image/webp" multiple>
                    </div>
                    <div id="mediaPreview" class="mt-4 grid grid-cols-3 gap-3"></div>
                    <div class="mt-5">
                        <label for="image_url" class="mb-2 block text-sm font-black text-[#061f4f]">URL gambar</label>
                        <input id="image_url" name="image_url" type="url" class="h-12 w-full rounded-lg border border-slate-200 px-4 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10" placeholder="https://...">
                    </div>
                    <label class="mt-4 flex items-center gap-3 text-sm font-bold text-slate-600">
                        <input id="is_primary" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-[#ff6a00] focus:ring-[#ff6a00]" checked>
                        Jadikan gambar utama
                    </label>
                </section>

                <section class="grid gap-3">
                    <button id="submitButton" class="rounded-full bg-[#ff6a00] px-6 py-4 text-sm font-black text-white shadow-[0_14px_28px_rgba(255,106,0,0.22)] hover:bg-[#e95d00]" type="submit">Simpan Produk</button>
                    <button id="deleteButton" hidden class="rounded-full border border-rose-200 px-6 py-4 text-sm font-black text-rose-700 hover:bg-rose-50" type="button">Hapus Produk</button>
                </section>
            </aside>
        </form>
    </main>

    <script src="assets/js/auth-store.js"></script>
    <script src="assets/js/vendor-api.js"></script>
    <script src="assets/js/media-uploader.js"></script>
    <script src="assets/js/vendor-product-form.js"></script>
</body>
</html>
