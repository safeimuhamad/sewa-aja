<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/sewaaja/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/sewaaja/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/sewaaja/assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/sewaaja/assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/sewaaja/site.webmanifest">
    <title>Katalog Produk - SewaAja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/sewaaja/">
                <img src="assets/img/sewaaja-logo-wordmark.webp" alt="SewaAja" class="brand-logo">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon" aria-hidden="true">&nbsp;</span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                    <li class="nav-item"><a class="nav-link active" href="/sewaaja/products">Katalog</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Cara Sewa</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sewaaja/login">Masuk</a></li>
                    <li class="nav-item"><a class="btn btn-brand ms-lg-2" href="/sewaaja/register">Daftar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="catalog-page">
        <section class="catalog-header">
            <div class="container">
                <div class="row align-items-end g-4">
                    <div class="col-lg-7">
                            <div class="eyebrow mb-3"><span aria-hidden="true">&nbsp;</span> katalog sewa</div>
                        <h1>Temukan barang yang siap disewa.</h1>
                        <p>Cari berdasarkan nama produk, kategori, lokasi vendor, harga, dan urutkan sesuai kebutuhanmu.</p>
                    </div>
                    <div class="col-lg-5">
                        <form class="catalog-search" id="searchForm">
                            <label for="searchInput" class="visually-hidden">Cari produk</label>
                            <input type="search" id="searchInput" class="form-control" placeholder="Cari kamera, kursi event, kendaraan...">
                            <button class="btn btn-brand" type="submit">Cari</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <section class="container catalog-layout">
            <aside class="filter-panel">
                <div class="filter-title">
                    <h2>Filter</h2>
                    <button class="btn btn-link p-0 auth-link" type="button" id="resetFilters">Reset</button>
                </div>
                <div class="mb-3">
                    <label for="categoryFilter" class="form-label">Kategori</label>
                    <select id="categoryFilter" class="form-select">
                        <option value="">Semua kategori</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="locationFilter" class="form-label">Lokasi</label>
                    <select id="locationFilter" class="form-select">
                        <option value="">Semua lokasi</option>
                    </select>
                </div>
                <div class="row g-3">
                    <div class="col-6">
                        <label for="minPriceFilter" class="form-label">Min</label>
                        <input type="number" min="0" id="minPriceFilter" class="form-control" placeholder="0">
                    </div>
                    <div class="col-6">
                        <label for="maxPriceFilter" class="form-label">Max</label>
                        <input type="number" min="0" id="maxPriceFilter" class="form-control" placeholder="500000">
                    </div>
                </div>
                <div class="mt-3">
                    <label for="sortFilter" class="form-label">Urutkan</label>
                    <select id="sortFilter" class="form-select">
                        <option value="newest">Terbaru</option>
                        <option value="price_asc">Harga termurah</option>
                        <option value="price_desc">Harga termahal</option>
                        <option value="name_asc">Nama A-Z</option>
                        <option value="stock_desc">Stok terbanyak</option>
                    </select>
                </div>
            </aside>

            <section class="catalog-results">
                <div class="catalog-toolbar">
                    <div>
                        <strong id="resultCount">Memuat produk...</strong>
                        <span id="activeFilters"></span>
                    </div>
                    <select id="perPageFilter" class="form-select">
                        <option value="6">6 per halaman</option>
                        <option value="12" selected>12 per halaman</option>
                        <option value="24">24 per halaman</option>
                    </select>
                </div>

                <div class="product-grid" id="productGrid" aria-live="polite"></div>
                <nav class="pagination-wrap" aria-label="Navigasi halaman produk">
                    <ul class="pagination" id="pagination"></ul>
                </nav>
            </section>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/products.js"></script>
</body>
</html>
