<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/sewaaja/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/sewaaja/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/sewaaja/assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/sewaaja/assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/sewaaja/site.webmanifest">
    <title>Masuk - SewaAja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/app.css" rel="stylesheet">
</head>
<body class="auth-body">
    <main class="auth-shell">
        <section class="auth-brand">
            <a href="/sewaaja/">
                <img src="assets/img/sewaaja-logo-wordmark.webp" alt="SewaAja" class="auth-logo">
            </a>
            <h1>Masuk ke akun SewaAja</h1>
            <p>Kelola booking, cek profile, dan mulai sewa barang dari vendor terpercaya.</p>
        </section>

        <section class="auth-card">
            <div class="auth-card-header">
                <h2>Login</h2>
                <p>Gunakan email dan password akunmu.</p>
            </div>
            <div class="alert d-none" id="formAlert" role="alert"></div>
            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" autocomplete="email" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember" checked>
                        <label class="form-check-label" for="remember">Ingat saya</label>
                    </div>
                    <button class="btn btn-link p-0 auth-link" type="button" id="forgotButton">Lupa password?</button>
                </div>
                <button class="btn btn-brand w-100 btn-lg" type="submit">Masuk</button>
            </form>
            <p class="auth-switch">Belum punya akun? <a href="/sewaaja/register">Daftar sekarang</a></p>
        </section>
    </main>

    <script src="assets/js/auth-store.js"></script>
    <script src="assets/js/auth-pages.js"></script>
</body>
</html>
