<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/sewaaja/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/sewaaja/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/sewaaja/assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/sewaaja/assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/sewaaja/site.webmanifest">
    <title>Daftar - SewaAja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/app.css" rel="stylesheet">
</head>
<body class="auth-body">
    <main class="auth-shell">
        <section class="auth-brand">
            <a href="/sewaaja/">
                <img src="assets/img/sewaaja-logo-wordmark.webp" alt="SewaAja" class="auth-logo">
            </a>
            <h1>Mulai bersama SewaAja</h1>
            <p>Daftar sebagai customer untuk menyewa barang, atau sebagai vendor untuk mulai menyewakan produkmu.</p>
        </section>

        <section class="auth-card">
            <div class="auth-card-header">
                <h2>Buat akun</h2>
                <p>Pilih tipe akun dan lengkapi data dasar.</p>
            </div>
            <div class="alert d-none" id="formAlert" role="alert"></div>
            <form id="registerForm" novalidate>
                <div class="role-toggle mb-3" role="group" aria-label="Pilih role">
                    <input type="radio" class="btn-check" name="role" id="roleCustomer" value="customer" checked>
                    <label class="btn" for="roleCustomer">Customer</label>
                    <input type="radio" class="btn-check" name="role" id="roleVendor" value="vendor">
                    <label class="btn" for="roleVendor">Vendor</label>
                </div>

                <div class="mb-3">
                    <label for="name" class="form-label">Nama lengkap</label>
                    <input type="text" class="form-control" id="name" name="name" autocomplete="name" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" autocomplete="email" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Nomor HP</label>
                    <input type="tel" class="form-control" id="phone" name="phone" autocomplete="tel">
                    <div class="invalid-feedback"></div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" autocomplete="new-password" required>
                    <div class="invalid-feedback"></div>
                </div>

                <div id="vendorFields" class="vendor-fields d-none">
                    <div class="mb-3">
                        <label for="store_name" class="form-label">Nama toko</label>
                        <input type="text" class="form-control" id="store_name" name="store_name">
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="city" class="form-label">Kota</label>
                            <input type="text" class="form-control" id="city" name="city">
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="province" class="form-label">Provinsi</label>
                            <input type="text" class="form-control" id="province" name="province">
                            <div class="invalid-feedback"></div>
                        </div>
                    </div>
                </div>

                <button class="btn btn-brand w-100 btn-lg mt-4" type="submit">Daftar</button>
            </form>
            <p class="auth-switch">Sudah punya akun? <a href="/sewaaja/login">Masuk</a></p>
        </section>
    </main>

    <script src="assets/js/auth-store.js"></script>
    <script src="assets/js/auth-pages.js"></script>
</body>
</html>
