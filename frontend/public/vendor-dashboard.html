<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/sewaaja/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/sewaaja/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/sewaaja/assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/sewaaja/assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/sewaaja/site.webmanifest">
    <meta name="robots" content="noindex">
    <title>Vendor Dashboard - SewaAja</title>
    <link rel="preload" href="assets/img/sewaaja-logo-wordmark.webp" as="image">
    <script>
        window.tailwind = window.tailwind || {};
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#061f4f',
                        orangeBrand: '#ff6a00',
                        ink: '#071a3d',
                    },
                    boxShadow: {
                        soft: '0 16px 40px rgba(6, 31, 79, 0.08)',
                    },
                },
            },
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fbff] text-[#071a3d] antialiased">
    <div class="min-h-screen lg:grid lg:grid-cols-[280px_1fr]">
        <aside class="border-b border-slate-200 bg-white lg:min-h-screen lg:border-b-0 lg:border-r">
            <div class="flex h-20 items-center justify-between px-5 lg:h-24">
                <a href="/sewaaja/" aria-label="SewaAja Home">
                    <img src="assets/img/sewaaja-logo-wordmark.webp" alt="SewaAja" class="h-14 w-44 object-contain object-center">
                </a>
            </div>
            <nav class="grid gap-2 px-5 pb-5 text-sm font-black text-[#061f4f]">
                <a href="/sewaaja/vendor-dashboard" class="rounded-lg bg-[#ff6a00] px-4 py-3 text-white">Dashboard</a>
                <a href="/sewaaja/vendor-product-form" class="rounded-lg px-4 py-3 hover:bg-slate-50 hover:text-[#ff6a00]">Tambah Produk</a>
                <a href="/sewaaja/products" class="rounded-lg px-4 py-3 hover:bg-slate-50 hover:text-[#ff6a00]">Lihat Katalog</a>
                <button id="logoutButton" class="rounded-lg px-4 py-3 text-left hover:bg-slate-50 hover:text-[#ff6a00]" type="button">Keluar</button>
            </nav>
        </aside>

        <main class="px-4 py-6 sm:px-6 lg:px-8">
            <div class="mb-8 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                <div>
                    <p class="text-sm font-black uppercase tracking-[0.16em] text-[#ff6a00]">Vendor Center</p>
                    <h1 class="mt-2 text-3xl font-black text-[#061f4f] sm:text-4xl" id="vendorName">Memuat vendor...</h1>
                    <p class="mt-2 text-sm font-semibold text-slate-500" id="vendorLocation">Menyiapkan ringkasan toko</p>
                </div>
                <a href="/sewaaja/vendor-product-form" class="inline-flex w-fit rounded-full bg-[#ff6a00] px-6 py-3 text-sm font-black text-white shadow-[0_14px_28px_rgba(255,106,0,0.22)] hover:bg-[#e95d00]">Tambah Produk</a>
            </div>

            <div id="dashboardAlert" hidden></div>

            <section id="statsGrid" class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4" aria-label="Statistik vendor">
                <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                    <p class="h-4 w-24 rounded bg-slate-100"></p>
                    <strong class="mt-4 block h-8 w-16 rounded bg-slate-100">&nbsp;</strong>
                </article>
                <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                    <p class="h-4 w-24 rounded bg-slate-100"></p>
                    <strong class="mt-4 block h-8 w-16 rounded bg-slate-100">&nbsp;</strong>
                </article>
                <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                    <p class="h-4 w-24 rounded bg-slate-100"></p>
                    <strong class="mt-4 block h-8 w-16 rounded bg-slate-100">&nbsp;</strong>
                </article>
                <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                    <p class="h-4 w-24 rounded bg-slate-100"></p>
                    <strong class="mt-4 block h-8 w-16 rounded bg-slate-100">&nbsp;</strong>
                </article>
            </section>

            <div class="mt-6 grid gap-6 xl:grid-cols-[1fr_360px]">
                <section class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm">
                    <div class="flex items-center justify-between border-b border-slate-100 px-5 py-4">
                        <h2 class="text-lg font-black text-[#061f4f]">Produk Saya</h2>
                        <a href="/sewaaja/vendor-product-form" class="text-sm font-black text-[#ff6a00]">Tambah</a>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full text-left">
                            <thead class="bg-slate-50 text-xs font-black uppercase tracking-[0.12em] text-slate-500">
                                <tr>
                                    <th class="px-4 py-3">Produk</th>
                                    <th class="px-4 py-3">Harga</th>
                                    <th class="px-4 py-3">Stok</th>
                                    <th class="px-4 py-3">Status</th>
                                    <th class="px-4 py-3 text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="productTable">
                                <tr><td class="px-4 py-6 text-center text-sm text-slate-500" colspan="5">Memuat produk...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                    <h2 class="text-lg font-black text-[#061f4f]">Ringkasan Penjualan</h2>
                    <div id="salesSummary" class="mt-3">
                        <div class="h-12 rounded bg-slate-100"></div>
                        <div class="mt-3 h-12 rounded bg-slate-100"></div>
                        <div class="mt-3 h-12 rounded bg-slate-100"></div>
                    </div>
                </section>
            </div>

            <section class="mt-6 overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm">
                <div class="border-b border-slate-100 px-5 py-4">
                    <h2 class="text-lg font-black text-[#061f4f]">Booking Masuk</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-left">
                        <thead class="bg-slate-50 text-xs font-black uppercase tracking-[0.12em] text-slate-500">
                            <tr>
                                <th class="px-4 py-3">Kode</th>
                                <th class="px-4 py-3">Customer</th>
                                <th class="px-4 py-3">Tanggal</th>
                                <th class="px-4 py-3">Qty</th>
                                <th class="px-4 py-3">Total</th>
                                <th class="px-4 py-3">Status</th>
                                <th class="px-4 py-3">Update</th>
                            </tr>
                        </thead>
                        <tbody id="bookingTable">
                            <tr><td class="px-4 py-6 text-center text-sm text-slate-500" colspan="7">Memuat booking...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="assets/js/auth-store.js"></script>
    <script src="assets/js/vendor-api.js"></script>
    <script src="assets/js/vendor-dashboard.js"></script>
</body>
</html>
