<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/sewaaja/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/sewaaja/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/sewaaja/assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/sewaaja/assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/sewaaja/site.webmanifest">
    <meta name="robots" content="noindex">
    <title>Customer Dashboard - SewaAja</title>
    <link rel="preload" href="assets/img/sewaaja-logo-wordmark.webp" as="image">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fbff] text-[#071a3d] antialiased">
    <div class="min-h-screen lg:grid lg:grid-cols-[280px_1fr]">
        <aside class="border-b border-slate-200 bg-white lg:min-h-screen lg:border-b-0 lg:border-r">
            <div class="flex h-20 items-center px-5 lg:h-24">
                <a href="/sewaaja/" aria-label="SewaAja Home">
                    <img src="assets/img/sewaaja-logo-wordmark.webp" alt="SewaAja" class="h-14 w-44 object-contain object-center">
                </a>
            </div>
            <nav class="grid gap-2 px-5 pb-5 text-sm font-black text-[#061f4f]">
                <a href="#overview" class="rounded-lg bg-[#ff6a00] px-4 py-3 text-white">Overview</a>
                <a href="#active" class="rounded-lg px-4 py-3 hover:bg-slate-50 hover:text-[#ff6a00]">Active Rentals</a>
                <a href="#history" class="rounded-lg px-4 py-3 hover:bg-slate-50 hover:text-[#ff6a00]">Rental History</a>
                <a href="#profile" class="rounded-lg px-4 py-3 hover:bg-slate-50 hover:text-[#ff6a00]">Profile Settings</a>
                <a href="/sewaaja/products" class="rounded-lg px-4 py-3 hover:bg-slate-50 hover:text-[#ff6a00]">Katalog</a>
                <button id="logoutButton" class="rounded-lg px-4 py-3 text-left hover:bg-slate-50 hover:text-[#ff6a00]" type="button">Keluar</button>
            </nav>
        </aside>

        <main class="px-4 py-6 sm:px-6 lg:px-8">
            <div class="mb-8 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                <div>
                    <p class="text-sm font-black uppercase tracking-[0.16em] text-[#ff6a00]">Customer Center</p>
                    <h1 class="mt-2 text-3xl font-black text-[#061f4f] sm:text-4xl" id="customerName">Customer SewaAja</h1>
                    <p class="mt-2 text-sm font-semibold text-slate-500" id="customerEmail">Memuat profile...</p>
                </div>
                <a href="/sewaaja/products" class="inline-flex w-fit rounded-full bg-[#ff6a00] px-6 py-3 text-sm font-black text-white shadow-[0_14px_28px_rgba(255,106,0,0.22)] hover:bg-[#e95d00]">Cari Produk</a>
            </div>

            <div id="customerAlert" hidden></div>

            <section id="overview" class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
                <div id="customerStats" class="contents">
                    <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                        <p class="h-4 w-24 rounded bg-slate-100"></p>
                        <strong class="mt-4 block h-8 w-16 rounded bg-slate-100">&nbsp;</strong>
                    </article>
                </div>
            </section>

            <section id="active" class="mt-6 rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                <div class="mb-5 flex flex-col justify-between gap-3 sm:flex-row sm:items-center">
                    <div>
                        <h2 class="text-xl font-black text-[#061f4f]">Active rentals</h2>
                        <p class="mt-1 text-sm font-semibold text-slate-500">Booking pending, confirmed, dan ongoing.</p>
                    </div>
                </div>
                <div id="activeRentals" class="grid gap-4"></div>
                <div id="activePagination" class="mt-5 flex flex-col items-center justify-between gap-3 sm:flex-row"></div>
            </section>

            <section id="history" class="mt-6 rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                <div class="mb-5">
                    <h2 class="text-xl font-black text-[#061f4f]">Rental history</h2>
                    <p class="mt-1 text-sm font-semibold text-slate-500">Booking completed dan cancelled.</p>
                </div>
                <div id="rentalHistory" class="grid gap-4"></div>
                <div id="historyPagination" class="mt-5 flex flex-col items-center justify-between gap-3 sm:flex-row"></div>
            </section>

            <section id="profile" class="mt-6 rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                <h2 class="text-xl font-black text-[#061f4f]">Profile settings</h2>
                <form id="profileForm" class="mt-5 grid gap-4 lg:grid-cols-3">
                    <div>
                        <label for="profileName" class="mb-2 block text-sm font-black text-[#061f4f]">Nama</label>
                        <input id="profileName" class="h-12 w-full rounded-lg border border-slate-200 px-4 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10" required>
                    </div>
                    <div>
                        <label for="profileEmail" class="mb-2 block text-sm font-black text-[#061f4f]">Email</label>
                        <input id="profileEmail" class="h-12 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 text-slate-500" disabled>
                    </div>
                    <div>
                        <label for="profilePhone" class="mb-2 block text-sm font-black text-[#061f4f]">Nomor HP</label>
                        <input id="profilePhone" class="h-12 w-full rounded-lg border border-slate-200 px-4 outline-none focus:border-[#ff6a00] focus:ring-4 focus:ring-[#ff6a00]/10">
                    </div>
                    <div class="lg:col-span-3">
                        <button class="rounded-full bg-[#ff6a00] px-6 py-3 text-sm font-black text-white hover:bg-[#e95d00]" type="submit">Simpan Profile</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script src="assets/js/auth-store.js"></script>
    <script src="assets/js/customer-api.js"></script>
    <script src="assets/js/customer-dashboard.js"></script>
</body>
</html>
