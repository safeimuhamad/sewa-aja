<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/sewaaja/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/sewaaja/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/sewaaja/assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/sewaaja/assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/sewaaja/site.webmanifest">
    <meta name="robots" content="noindex">
    <title>Detail Booking - SewaAja</title>
    <link rel="preload" href="assets/img/sewaaja-logo-wordmark.webp" as="image">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fbff] text-[#071a3d] antialiased">
    <header class="sticky top-0 z-50 border-b border-slate-100 bg-white/90 backdrop-blur-xl">
        <nav class="mx-auto flex h-20 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
            <a href="/sewaaja/customer-dashboard" aria-label="Customer Dashboard">
                <img src="assets/img/sewaaja-logo-wordmark.webp" alt="SewaAja" class="h-14 w-44 object-contain object-center">
            </a>
            <div class="flex items-center gap-3">
                <a href="/sewaaja/customer-dashboard" class="rounded-full border border-slate-200 px-4 py-2 text-sm font-black text-[#061f4f] hover:border-[#ff6a00] hover:text-[#ff6a00]">Dashboard</a>
                <button id="logoutButton" class="rounded-full px-4 py-2 text-sm font-black text-[#061f4f] hover:text-[#ff6a00]" type="button">Keluar</button>
            </div>
        </nav>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <div id="detailAlert" hidden></div>

        <section class="mb-6 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
            <div class="flex flex-col justify-between gap-4 lg:flex-row lg:items-start">
                <div>
                    <p class="text-sm font-black uppercase tracking-[0.16em] text-[#ff6a00]">Booking Detail</p>
                    <div class="mt-2 flex flex-wrap items-center gap-3">
                        <h1 id="bookingTitle" class="text-3xl font-black text-[#061f4f]">Memuat booking...</h1>
                        <span id="bookingStatus" class="rounded-full bg-slate-50 px-4 py-2 text-sm font-black text-slate-500">status</span>
                    </div>
                    <p id="bookingMeta" class="mt-3 text-sm font-semibold text-slate-500">Vendor dan tanggal sewa</p>
                </div>
                <div class="flex flex-wrap gap-3">
                    <button id="downloadInvoice" class="rounded-full bg-[#061f4f] px-5 py-3 text-sm font-black text-white hover:bg-[#ff6a00]" type="button">Download Invoice</button>
                    <button id="cancelBooking" class="rounded-full border border-rose-200 px-5 py-3 text-sm font-black text-rose-700 hover:bg-rose-50" type="button">Cancel Booking</button>
                </div>
            </div>
        </section>

        <div class="grid gap-6 lg:grid-cols-[1fr_360px]">
            <section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                <h2 class="text-xl font-black text-[#061f4f]">Item booking</h2>
                <div id="bookingItems" class="mt-5 grid gap-4"></div>
            </section>

            <aside class="grid gap-6">
                <section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                    <h2 class="text-xl font-black text-[#061f4f]">Ringkasan</h2>
                    <div id="bookingSummary" class="mt-3"></div>
                </section>
                <section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                    <h2 class="text-xl font-black text-[#061f4f]">Payment</h2>
                    <div id="paymentInfo" class="mt-4 grid gap-3"></div>
                </section>
            </aside>
        </div>
    </main>

    <script src="assets/js/auth-store.js"></script>
    <script src="assets/js/customer-api.js"></script>
    <script src="assets/js/customer-booking-detail.js"></script>
</body>
</html>
